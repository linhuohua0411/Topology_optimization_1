    seedemu-internet-client:
        image: handsonsecurity/seedemu-multiarch-map:buildx-latest
        container_name: seedemu_internet_map
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        ports:
            - 8080:8080/tcp

    neo4j:
        image: neo4j:latest
        container_name: eth_neo4j
        ports:
            - "7475:7474"  # HTTP
            - "7688:7687"  # Bolt
        environment:
            - NEO4J_AUTH=neo4j/1qaz@WSX
            - NEO4J_dbms_memory_pagecache_size=1G
            - NEO4J_dbms_memory_heap_initial__size=1G
            - NEO4J_dbms_memory_heap_max__size=1G
            - NEO4J_dbms_connector_http_listen__address=0.0.0.0:7474
            - NEO4J_dbms_connector_bolt_listen__address=0.0.0.0:7687
            - NEO4J_dbms_security_auth__enabled=true
        # volumes:
        #     - ./neo4j/data:/data
        #     - ./neo4j/logs:/logs
        #     - ./neo4j/import:/import
        #     - ./neo4j/plugins:/plugins
        networks:
            - net_151_net0
            - net_152_net0

    eth_node_cleaner:
        build: ./eth_node_cleaner  # 或你自定义的python基础镜像
        container_name: eth_node_cleaner
        depends_on:
            - f1d53a66de3c35d8a921558f3b4bdbbd
            - redis
            - neo4j
        ports:
            - "8888:8888"  # 暴露中央数据收集器端口
        networks:
            - net_151_net0
            - net_152_net0
        environment:
            - NEO4J_URI=bolt://eth_neo4j:7687
            - NEO4J_USERNAME=neo4j
            - NEO4J_PASSWORD=1qaz@WSX
            - REDIS_HOST=eth_redis
            - REDIS_PORT=6379
            - POSTGRES_DSN=postgresql://postgres:password@eth_postgresql:5432/ethereum_monitor

    eth_simulation:
        build: ./eth_simulation
        container_name: eth_simulation
        depends_on:
            postgresql:
                condition: service_healthy
            redis:
                condition: service_healthy
        ports:
            - "127.0.0.1:8890:8890"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock  # 混沌代理需要 Docker socket
        networks:
            - net_151_net0
            - net_152_net0
        environment:
            # 以太坊配置（连接 POS-3 的 Geth RPC）
            - ETH_RPC_URL=http://10.151.0.73:8545
            - ETH_CHAIN_ID=1337
            # 中央收集器
            # 数据库
            - POSTGRESQL_DSN=postgresql://postgres:password@eth_postgresql:5432/ethereum_monitor
            # 交易配置
            - TX_MIN_INTERVAL=15
            - TX_MAX_INTERVAL=45
            # 混沌代理配置
            - CHAOS_DOWN_MIN=60
            - CHAOS_DOWN_MAX=120
            - CHAOS_UP_MIN=180
            - CHAOS_UP_MAX=480
            - CHAOS_INTERFACE=net0
            - CHAOS_TARGET_PATTERNS=as151h-Ethereum-POS-,as152h-Ethereum-POS-
            - CHAOS_RESTORE_RETRY_SECONDS=30
            # 合约部署者
            - CONTRACT_DEPLOYER=0x8c400205fDb103431F6aC7409655ad3cf8f6d007
            - UNLOCKED_ACCOUNTS=0x8c400205fDb103431F6aC7409655ad3cf8f6d007
            - CONTRACT_DEPLOY_MIN_INTERVAL=180
            - CONTRACT_DEPLOY_MAX_INTERVAL=420
            - CONTROL_PORT=8890
            - WAN_EVENT_MIN_INTERVAL=90
            - WAN_EVENT_MAX_INTERVAL=240
            - WAN_DURATION_MIN=120
            - WAN_DURATION_MAX=300
            - WAN_TARGET_PATTERNS=brd-
            - LOG_LEVEL=INFO
        restart: unless-stopped

    eth_node_monitoring:
        build: ./eth_node_monitoring
        container_name: eth_node_monitoring
        depends_on:
            - redis
            - neo4j
            - postgresql
        ports:
            - "9999:9999"
        networks:
            - net_151_net0
            - net_152_net0
        environment:
            - NEO4J_URI=bolt://eth_neo4j:7687
            - NEO4J_USERNAME=neo4j
            - NEO4J_PASSWORD=1qaz@WSX
            - REDIS_HOST=eth_redis
            - REDIS_PORT=6379
            - POSTGRESQL_DSN=postgresql://postgres:password@eth_postgresql:5432/ethereum_monitor
            - MONITORING_PORT=9999
            - LOG_LEVEL=INFO
            - TOPOLOGY_POLL_INTERVAL=10
            - MAX_RECENT_EVENTS=200
        restart: unless-stopped

    seedemu-ether-client:
        image: 19867214137/seedemu-multiarch-etherview:buildx-latest
        container_name: seedemu_ether_view
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        ports:
            - 5000:5000/tcp
        networks:
            - net_151_net0
            - net_152_net0

# === 存储卷 ===
volumes:
    postgresql_data:
        driver: local
    redis_data:
        driver: local

networks:
    net_151_net0:
        driver_opts:
            com.docker.network.driver.mtu: 1500
        ipam:
            config:
                - subnet: 10.151.0.0/24
        labels:
            org.seedsecuritylabs.seedemu.meta.type: "local"
            org.seedsecuritylabs.seedemu.meta.scope: "151"
            org.seedsecuritylabs.seedemu.meta.name: "net0"
            org.seedsecuritylabs.seedemu.meta.prefix: "10.151.0.0/24"

