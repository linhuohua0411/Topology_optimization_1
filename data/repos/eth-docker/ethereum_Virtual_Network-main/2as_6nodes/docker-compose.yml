services:
    39e016aa9e819f203ebc1809245a5818:
        build:
            context: .
            dockerfile: dummies/39e016aa9e819f203ebc1809245a5818
        image: 39e016aa9e819f203ebc1809245a5818

    f1d53a66de3c35d8a921558f3b4bdbbd:
        build:
            context: .
            dockerfile: dummies/f1d53a66de3c35d8a921558f3b4bdbbd
        image: f1d53a66de3c35d8a921558f3b4bdbbd

    # === 数据库服务 ===
    postgresql:
        image: postgres:15-alpine
        container_name: eth_postgresql
        ports:
            - "5433:5432"
        environment:
            - POSTGRES_DB=ethereum_monitor
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=password
            - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --locale=C
        volumes:
            - postgresql_data:/var/lib/postgresql/data
            - ./postgresql/init:/docker-entrypoint-initdb.d
        networks:
            - net_151_net0
            - net_152_net0
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d ethereum_monitor"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: eth_redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - net_151_net0
            - net_152_net0
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

