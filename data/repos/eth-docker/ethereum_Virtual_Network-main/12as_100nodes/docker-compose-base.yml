version: "3.4"
services:
    f1d53a66de3c35d8a921558f3b4bdbbd:
        build:
            context: .
            dockerfile: dummies/f1d53a66de3c35d8a921558f3b4bdbbd
        image: f1d53a66de3c35d8a921558f3b4bdbbd

    39e016aa9e819f203ebc1809245a5818:
        build:
            context: .
            dockerfile: dummies/39e016aa9e819f203ebc1809245a5818
        image: 39e016aa9e819f203ebc1809245a5818

    # === 数据库服务 ===
    postgresql:
        image: postgres:15-alpine
        container_name: eth_postgresql
        ports:
            - "5433:5432"
        environment:
            - POSTGRES_DB=ethereum_monitor
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=password
            - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --locale=C
        volumes:
            - postgresql_data:/var/lib/postgresql/data
            - ./postgresql/init:/docker-entrypoint-initdb.d
        networks:
            - net_101_inet0
            - net_101_inet1
            - net_101_inet2
            - net_102_inet0
            - net_102_inet1
            - net_102_inet2
            - net_103_inet0
            - net_103_inet1
            - net_103_inet2
            - net_104_inet0
            - net_104_inet1
            - net_104_inet2
            - net_105_inet0
            - net_105_inet1
            - net_105_inet2
            - net_106_inet0
            - net_106_inet1
            - net_106_inet2
            - net_107_inet0
            - net_107_inet1
            - net_107_inet2
            - net_108_inet0
            - net_108_inet1
            - net_108_inet2
            - net_109_inet0
            - net_109_inet1
            - net_109_inet2
            - net_110_inet0
            - net_110_inet1
            - net_110_inet2
            - net_111_inet0
            - net_111_inet1
            - net_111_inet2
            - net_112_inet0
            - net_112_inet1
            - net_112_inet2
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d ethereum_monitor"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: eth_redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - net_101_inet0
            - net_101_inet1
            - net_101_inet2
            - net_102_inet0
            - net_102_inet1
            - net_102_inet2
            - net_103_inet0
            - net_103_inet1
            - net_103_inet2
            - net_104_inet0
            - net_104_inet1
            - net_104_inet2
            - net_105_inet0
            - net_105_inet1
            - net_105_inet2
            - net_106_inet0
            - net_106_inet1
            - net_106_inet2
            - net_107_inet0
            - net_107_inet1
            - net_107_inet2
            - net_108_inet0
            - net_108_inet1
            - net_108_inet2
            - net_109_inet0
            - net_109_inet1
            - net_109_inet2
            - net_110_inet0
            - net_110_inet1
            - net_110_inet2
            - net_111_inet0
            - net_111_inet1
            - net_111_inet2
            - net_112_inet0
            - net_112_inet1
            - net_112_inet2
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    neo4j:
        image: neo4j:latest
        container_name: eth_neo4j
        ports:
            - "7475:7474"  # HTTP
            - "7688:7688"  # Bolt
        environment:
            - NEO4J_AUTH=neo4j/1qaz@WSX
            # 更新内存配置（新版参数）
            - NEO4J_server_memory_pagecache_size=1G
            - NEO4J_server_memory_heap_initial__size=1G
            - NEO4J_server_memory_heap_max__size=1G
            # 更新监听地址配置（新版参数）
            - NEO4J_server_http_listen__address=0.0.0.0:7474
            - NEO4J_server_bolt_listen__address=0.0.0.0:7688
        # volumes:
        #     - ./neo4j/data:/data
        #     - ./neo4j/logs:/logs
        #     - ./neo4j/import:/import
        #     - ./neo4j/plugins:/plugins
        networks:
            - net_101_inet0
            - net_101_inet1
            - net_101_inet2
            - net_102_inet0
            - net_102_inet1
            - net_102_inet2
            - net_103_inet0
            - net_103_inet1
            - net_103_inet2
            - net_104_inet0
            - net_104_inet1
            - net_104_inet2
            - net_105_inet0
            - net_105_inet1
            - net_105_inet2
            - net_106_inet0
            - net_106_inet1
            - net_106_inet2
            - net_107_inet0
            - net_107_inet1
            - net_107_inet2
            - net_108_inet0
            - net_108_inet1
            - net_108_inet2
            - net_109_inet0
